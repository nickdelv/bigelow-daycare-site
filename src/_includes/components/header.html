{% if client.announcement.enabled %}
<div class="announcement-banner" role="alert">
  <span>
    {{ client.announcement.text }} ·
    <a href="{{ client.announcement.linkUrl }}">
      {{ client.announcement.linkText }}
    </a>
  </span>
  <button
    class="banner-close"
    onclick="this.parentElement.style.display = 'none'"
    aria-label="Dismiss"
  >
    &times;
  </button>
</div>
{% endif %}

<nav class="site-nav" role="navigation" aria-label="Main navigation">
  <div class="container">
    <a
      href="index.html"
      class="nav-logo"
      aria-label="Bigelow Cooperative — home"
    >
      <img
        src="/assets/images/bigelow-logo.webp"
        alt="Bigelow Cooperative"
        width="1489"
        height="514"
      />
    </a>
    <button
      class="nav-hamburger"
      id="navToggle"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="navLinks"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="about.html">About</a></li>
      <li><a href="programs.html">Programs</a></li>
      <li><a href="enrollment.html">Enrollment</a></li>
      <li class="nav-cta">
        <a href="schedule-a-tour.html">Schedule a tour</a>
      </li>
    </ul>
  </div>
</nav>
